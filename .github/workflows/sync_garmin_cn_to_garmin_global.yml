name: Sync Garmin CN to Garmin Global

on:
  workflow_dispatch:          # 允许手动触发
  schedule:
    # 每6小时执行一次（UTC 时间）
    # 北京时间: 08:00 / 14:00 / 20:00 / 02:00
    - cron: "0 */6 * * *"

env:
  # 请在 GitHub Secrets 中配置以下变量
  BARK_KEY: ${{ secrets.BARK_KEY }}
  GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
  GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
  GARMIN_GLOBAL_USERNAME: ${{ secrets.GARMIN_GLOBAL_USERNAME }}
  GARMIN_GLOBAL_PASSWORD: ${{ secrets.GARMIN_GLOBAL_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest
    name: Sync Garmin CN to Garmin Global
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '14'
          cache: 'yarn'
      - run: yarn
      - run: yarn sync_cn
        timeout-minutes: 5
      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Save Garmin Session
